# Publishes all public npm workspace packages using npm trusted publishing (OIDC).
# No long-lived NPM_TOKEN for publishes—the CLI exchanges the GitHub OIDC token
# with the registry when this workflow is listed as the trusted publisher.
#
# Prerequisites (npmjs.com)
# - For each package under @openattitude/*: Package → Settings → Trusted publishing,
#   add GitHub Actions with this repository and workflow filename: publish-npm.yml
#   (filename only, case-sensitive, including .yml).
# - Requires GitHub-hosted runners (self-hosted is not supported for npm OIDC yet).
#
# Optional: if npm install ever needs private registry packages, set NPM_READ_TOKEN
# (read-only granular token) only on the install step—not for publish.
#
# Publishes only workspaces whose current version is not yet on npm (see
# publish step). Bump versions only for packages you intend to release; the
# rest are skipped. Publish @openattitude/core before dependents when core
# changes. Keep "@openattitude/core": "^x.y.z" aligned when core’s semver
# line changes.
#
# Ref: https://docs.npmjs.com/trusted-publishers
#
# If publish fails with 404 / “could not be found or you do not have permission” while OIDC
# and the Trusted publisher UI look correct, upgrade npm first: older npm 11.5.x can mis-report
# trusted-publishing failures as 404. Pin ≥11.6.2 in the step below (see npm/cli#9088).
#
# Triggers: manual run, or GitHub Release published.

name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for GitHub → npm OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Trusted publishing: npm 11.5.x can falsely return E404 / ENEEDAUTH; use ≥11.6.2.
      # Node 24 + registry from setup-node is fine; npm is upgraded globally for the job only.
      - name: Update npm for OIDC publish
        run: |
          npm install -g 'npm@^11.6.2'
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test --workspaces --if-present

      - name: Publish workspaces to npm
        run: |
          set -euo pipefail
          # npm view / publish use the registry from setup-node (registry.npmjs.org).
          # @openattitude/core first; then remaining workspaces (order for consistency).
          PACKAGES=(
            @openattitude/core
            @openattitude/other-gps-generic
            @openattitude/steam-airspeedindicator-senecaii
            @openattitude/steam-altimeter20kft-senecaii
            @openattitude/steam-attitudegyro-senecaii
            @openattitude/steam-clock-generic
            @openattitude/steam-egt-senecaii
            @openattitude/steam-engine-senecaii
            @openattitude/steam-enginerpm-senecaii
            @openattitude/steam-flapindicator-senecaii
            @openattitude/steam-fuelflow-senecaii
            @openattitude/steam-gyropressure-senecaii
            @openattitude/steam-ki209-generic
            @openattitude/steam-ki227-senecaii
            @openattitude/steam-ki525-generic
            @openattitude/steam-manifoldpressure-senecaii
            @openattitude/steam-turncoordinator-generic
            @openattitude/steam-verticalspeedindicator-generic
          )
          published=0
          skipped=0
          for pkg in "${PACKAGES[@]}"; do
            dir="${pkg#@openattitude/}"
            ver="$(jq -r '.version' "packages/${dir}/package.json")"
            # First-time packages are not on the registry yet: npm view returns 404 (expected).
            if npm view "${pkg}@${ver}" version --loglevel=silent >/dev/null 2>&1; then
              echo "Skip ${pkg}@${ver} (already on npm)"
              skipped=$((skipped + 1))
              continue
            fi
            echo "Publish ${pkg}@${ver}"
            npm publish -w "$pkg" --access public
            published=$((published + 1))
          done
          echo "Done. Published ${published} package(s), skipped ${skipped} unchanged version(s)."
