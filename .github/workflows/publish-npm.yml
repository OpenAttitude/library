
name: Publish Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare (install, test, compute publish matrix)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.matrix.outputs.packages }}
      publish_count: ${{ steps.matrix.outputs.publish_count }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm (registry client)
        run: npm install -g 'npm@^11.6.2'

      - name: Install dependencies and build workspaces
        run: npm ci

      - name: Test
        run: npm test --workspaces --if-present

      - id: matrix
        name: Compute packages to publish
        run: |
          set -euo pipefail
          need_publish=()

          add_if_needed() {
            local dir="$1"
            local pj="${dir}/package.json"
            local pkg ver private

            pkg=$(jq -r .name "$pj")
            ver=$(jq -r .version "$pj")
            private=$(jq -r '.private // false' "$pj")

            if [ "$private" = "true" ]; then
              echo "Skip $pkg (private)"
              return 0
            fi

            if npm view "${pkg}@${ver}" version --loglevel=silent >/dev/null 2>&1; then
              echo "Skip $pkg@$ver (already on npm)"
              return 0
            fi

            echo "Will publish $pkg@$ver"
            need_publish+=("$pkg")
          }

          if [ -f packages/core/package.json ]; then
            add_if_needed packages/core
          fi

          for d in packages/*/; do
            d="${d%/}"
            if [ "$d" = "packages/core" ]; then
              continue
            fi
            add_if_needed "$d"
          done

          packages_json=$(printf '%s\n' "${need_publish[@]}" | jq -R -s 'split("\n") | map(select(length>0))' -c)
          count=${#need_publish[@]}

          echo "publish_count=$count" >> "$GITHUB_OUTPUT"
          {
            echo 'packages<<JSON_EOF'
            echo "$packages_json"
            echo 'JSON_EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Packages to publish (count=$count): $packages_json"

  publish:
    name: Publish ${{ matrix.package }}
    needs: prepare
    if: needs.prepare.outputs.publish_count != '0'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm (OIDC trusted publishing)
        run: npm install -g 'npm@^11.6.2'

      - name: Install dependencies (skip root postinstall → no full-workspace build)
        run: npm ci --ignore-scripts

      - name: Build workspace deps needed for this package
        run: |
          set -euo pipefail
          pkg="${{ matrix.package }}"
          # @openattitude/core exposes ./dist; steam-* link it for vite. core / other-gps-generic do not need this step.
          if [ "$pkg" != "@openattitude/core" ] && [ "$pkg" != "@openattitude/other-gps-generic" ]; then
            echo "Building @openattitude/core for $pkg"
            npm run build -w @openattitude/core
          else
            echo "Skipping core build for $pkg"
          fi

      - name: Publish to npm (OIDC)
        env:
          NPM_CONFIG_LOGLEVEL: error
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN || true
          echo "Publishing ${{ matrix.package }}"
          npm publish -w "${{ matrix.package }}" --access public
