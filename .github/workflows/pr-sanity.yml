name: PR Sanity

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  sanity:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Core sanity test
        run: npm run test --workspace=@openattitude/core --if-present

      - name: Core sanity build
        run: npm run build --workspace=@openattitude/core
